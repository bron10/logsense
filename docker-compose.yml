services:
  loki:
    image: grafana/loki:3.0.0
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki-config.yaml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --output-document=- http://localhost:3100/ready | grep -q ready || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  promtail:
    image: grafana/promtail:3.0.0
    volumes:
      - ./config/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - ./sample-logs:/var/log/logsense:ro
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      loki:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      loki:
        condition: service_healthy

  log-parser:
    build:
      context: ./parser
    environment:
      - LOKI_URL=http://loki:3100
      - LOG_DIR=/var/log/logsense
      - JOB_LABEL=logsense-parsed
    volumes:
      - ./sample-logs:/var/log/logsense:ro
    depends_on:
      loki:
        condition: service_healthy
